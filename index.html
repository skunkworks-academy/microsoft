<!doctype html>
<html lang="en-ZA">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Microsoft Training Catalogue moved | Skunkworks Academy</title>
  <meta name="description" content="The Skunkworks Academy Microsoft Training Catalogue has moved to the unified Academy Microsoft catalogue." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://skunkworksacademy.com/microsoft/" />
  <meta http-equiv="refresh" content="0; url=https://skunkworksacademy.com/microsoft/" />
  <style>
    :root{color-scheme:light dark;--bg:#050505;--text:#f5f5f5;--muted:#a3a3a3;--line:#2a2a2a;--accent:#0f62fe}
    @media (prefers-color-scheme:light){:root{--bg:#f8fafc;--text:#050505;--muted:#475569;--line:#dbe3ef}}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px}

    p{color:var(--muted);line-height:1.6}
    a{display:inline-flex;margin-top:14px;border-radius:999px;background:var(--accent);color:#fff;text-decoration:none;font-weight:800;padding:12px 16px}
  </style>
</head>
<body>
  <main>
    <h1>Microsoft Training Catalogue moved.</h1>
    <p>The Microsoft catalogue has been moved into the Skunkworks Academy unified site repository under <code>skunkworks-academy/.github/microsoft</code>.</p>
    <p>You should be redirected automatically to the canonical Microsoft catalogue.</p>
    <a href="https://skunkworksacademy.com/microsoft/">Open Microsoft catalogue</a>
  </main>
